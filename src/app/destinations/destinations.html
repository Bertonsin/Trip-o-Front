<div class="destinations-container">
    <ng-container *ngIf="destinations().length > 0">
        <app-destinations-card-item *ngFor="let destination of destinations()" [destination]="destination"></app-destinations-card-item>
    </ng-container>
    <span class="material-symbols-outlined" style="font-size: 48px;">
        map_search
        </span>
    <p class="destinations-title">Nenhuma viagem por aqui ainda</p>
    <p class="destinations-description">Crie sua primeira viagem para começar a planejar suas aventuras</p>
</div>
